version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: irctc-postgres
    environment:
      POSTGRES_DB: irctc_db
      POSTGRES_USER: irctc_user
      POSTGRES_PASSWORD: irctc_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: