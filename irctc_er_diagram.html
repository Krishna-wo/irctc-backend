
<style>
#erd { padding: 1rem 0; }
#erd svg { width: 100%; height: auto; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const { svg } = await mermaid.render('erd-svg', `erDiagram
  USERS ||--o{ BOOKINGS : "places"
  TRAINS ||--o{ ROUTES : "has stops"
  TRAINS ||--o{ COACHES : "has"
  STATIONS ||--o{ ROUTES : "appears in"
  COACHES ||--o{ SEATS : "contains"
  BOOKINGS ||--o{ BOOKED_SEATS : "includes"
  SEATS ||--o{ BOOKED_SEATS : "assigned to"
  BOOKINGS }o--|| STATIONS : "source"
  BOOKINGS }o--|| STATIONS : "destination"
  BOOKINGS }o--|| TRAINS : "on"

  USERS {
    bigserial id PK
    varchar name
    varchar email UK
    varchar password_hash
    varchar phone UK
    varchar role
    timestamp created_at
    timestamp updated_at
  }
  STATIONS {
    bigserial id PK
    varchar name
    varchar code UK
    varchar city
    varchar state
  }
  TRAINS {
    bigserial id PK
    varchar train_number UK
    varchar name
    varchar type
    int total_distance_km
    timestamp created_at
  }
  ROUTES {
    bigserial id PK
    bigint train_id FK
    bigint station_id FK
    int sequence_number
    time arrival_time
    time departure_time
    int distance_from_origin
  }
  COACHES {
    bigserial id PK
    bigint train_id FK
    varchar coach_number
    varchar coach_type
    int total_seats
  }
  SEATS {
    bigserial id PK
    bigint coach_id FK
    varchar seat_number
    varchar seat_type
  }
  BOOKINGS {
    bigserial id PK
    bigint user_id FK
    bigint train_id FK
    bigint source_station_id FK
    bigint destination_station_id FK
    date journey_date
    varchar status
    decimal total_fare
    varchar pnr_number UK
    timestamp created_at
    timestamp updated_at
  }
  BOOKED_SEATS {
    bigserial id PK
    bigint booking_id FK
    bigint seat_id FK
    varchar passenger_name
    int passenger_age
    varchar passenger_gender
    decimal fare
  }
`);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
