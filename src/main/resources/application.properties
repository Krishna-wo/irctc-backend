
server.port=8081


spring.datasource.url=jdbc:postgresql://localhost:5432/irctc_db
spring.datasource.username=irctc_user
spring.datasource.password=irctc_password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate


spring.jpa.show-sql=false

spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
────
jwt.secret=your-super-secret-key-must-be-at-least-32-characters-long
jwt.expiration=86400000


logging.level.com.irctc=INFO

logging.level.org.springframework.security=WARN

logging.level.org.hibernate.SQL=WARN

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true

# ── Redis ─────────────────────────────────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379
# No password for local dev — in production always set a password
spring.data.redis.timeout=2000ms
# timeout=2000ms means: if Redis doesn't respond in 2 seconds, fail fast
# Don't wait forever — better to fall back to DB than hang the request

# Connection pool settings
spring.data.redis.lettuce.pool.max-active=10
# max-active=10 means: maximum 10 simultaneous Redis connections
# Each request that needs Redis gets one connection from this pool

spring.data.redis.lettuce.pool.max-idle=5
# max-idle=5 means: keep 5 connections open even when idle
# Saves time of creating new connections for each request

spring.data.redis.lettuce.pool.min-idle=1
# Always keep at least 1 connection ready
# Tell Spring Data Redis to not scan for repositories
# Our repositories are all JPA — not Redis
spring.data.redis.repositories.enabled=false
